name: PHPUnit

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Verify version sync
        run: |
          HEADER=$(sed -n 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*//p' admin-filters-for-memberpress.php | head -n1 | tr -d '\r')
          CONST=$(grep "define('MEPRMF_VERSION'" admin-filters-for-memberpress.php | sed -E "s/.*'([0-9.]+)'.*/\1/")
          [[ "$HEADER" == "$CONST" ]] || { echo "Version mismatch: header=$HEADER, const=$CONST"; exit 1; }

      - name: Run unit tests
        run: vendor/bin/phpunit
